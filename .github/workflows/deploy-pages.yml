name: Deploy TaxTag to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site (project path /Tax/)
        run: |
          mkdir -p _site
          cp -R public/. _site/
          # Keep relative asset paths; add base for GitHub project pages
          python3 - <<'PY'
          from pathlib import Path
          html = Path('_site/index.html')
          text = html.read_text(encoding='utf-8')
          if '<base ' not in text:
              text = text.replace('<head>', '<head>\n  <base href="/Tax/" />', 1)
          html.write_text(text, encoding='utf-8')
          not_found = Path('_site/404.html')
          if not_found.exists():
              nf = not_found.read_text(encoding='utf-8')
              nf = nf.replace('href="/css/app.css"', 'href="/Tax/css/app.css"')
              nf = nf.replace('href="/"', 'href="/Tax/"')
              not_found.write_text(nf, encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
