<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="TaxTag — จัดหมวดรายการโอน Peerland / statement ส่วนตัว" />
  <meta name="theme-color" content="#f7f6f2" />
  <title>TaxTag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a1a'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-size='14' fill='%23f7f6f2' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-name">TaxTag</span>
      <span class="brand-sub" id="sync-status">พร้อมใช้งาน</span>
    </div>
    <div class="top-actions">
      <button type="button" class="btn quiet" id="btn-auth">เข้าสู่ระบบ Google</button>
      <button type="button" class="btn quiet" id="btn-peerland">Peerland</button>
      <label class="btn quiet file-btn" for="file-input">
        นำเข้า
        <input id="file-input" type="file" accept=".pdf,.xls,.xlsx,.csv,application/pdf,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv" multiple hidden />
      </label>
      <button type="button" class="btn solid" id="btn-export">Export XLSX</button>
    </div>
  </header>

  <main class="shell">
    <section class="hero" id="empty-state">
      <h1>TaxTag</h1>
      <p>จัดหมวดรายการโอนแบบเรียบง่าย — พิมพ์คอมเมนต์ได้เลย ไม่ต้องกดบันทึก</p>
      <div class="hero-actions">
        <button type="button" class="btn solid" id="btn-peerland-hero">เปิด Peerland 2024–2025</button>
        <button type="button" class="btn quiet" id="btn-demo">ตัวอย่างสั้น</button>
      </div>
      <p class="fine">ล็อกอินด้วย <strong>yohaken@gmail.com</strong> ครั้งเดียว ซิงค์หมวด/คอมเมนต์ข้ามเครื่อง</p>
    </section>

    <section class="workspace is-hidden" id="workspace">
      <div class="filters">
        <input id="search-input" type="search" placeholder="ค้นหาชื่อ · ยอดเงิน · หมวด…" autocomplete="off" />
        <select id="filter-category" aria-label="หมวด">
          <option value="">ทุกหมวด</option>
          <option value="__uncat">ยังไม่มีหมวด</option>
        </select>
        <select id="filter-direction" aria-label="ทิศทาง">
          <option value="">เข้า/ออก</option>
          <option value="in">เงินเข้า</option>
          <option value="out">เงินออก</option>
        </select>
        <input id="date-from" type="date" aria-label="จากวันที่" />
        <input id="date-to" type="date" aria-label="ถึงวันที่" />
      </div>

      <div class="stats" id="stat-grid">
        <span><em id="stat-count">0</em> รายการ</span>
        <span>ยังไม่ติดป้าย <em id="stat-uncat">0</em></span>
        <span class="in">เข้า <em id="stat-in">฿0</em></span>
        <span class="out">ออก <em id="stat-out">฿0</em></span>
      </div>

      <div class="table-scroll">
        <table class="tx-table" id="tx-table">
          <thead>
            <tr>
              <th>วันที่</th>
              <th>รายละเอียด</th>
              <th class="num">เข้า</th>
              <th class="num">ออก</th>
              <th>หมวด</th>
              <th>คอมเมนต์</th>
            </tr>
          </thead>
          <tbody id="tx-body"></tbody>
        </table>
      </div>
      <p class="result-label" id="result-label">แสดง 0 รายการ</p>
    </section>
  </main>

  <datalist id="category-datalist"></datalist>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.1.0/dist/fuse.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
